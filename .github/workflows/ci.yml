name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || echo "No lint script"

      - name: Build Next.js app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-error-logs
          path: .next/

  test-seo:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for sitemap.xml
        run: |
          if [ ! -f "public/sitemap.xml" ]; then
            echo "⚠️ Warning: sitemap.xml not found"
          fi

      - name: Check for robots.txt
        run: |
          if [ ! -f "public/robots.txt" ]; then
            echo "⚠️ Warning: robots.txt not found"
          fi

      - name: Validate meta tags exist
        run: |
          if ! grep -q "export.*metadata" src/app/layout.tsx 2>/dev/null; then
            echo "⚠️ Warning: No metadata export found in layout"
          fi
